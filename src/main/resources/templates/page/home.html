<!-- template\Page\home.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord - Tourisme</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    
    <!-- Sidebar gauche -->
    <aside th:replace="~{fragments/nav :: navbar}"></aside>

    <!-- Zone de contenu (Décalee de 64 unités pour laisser place au menu) -->
    <main class="ml-64 p-8">
        
        <!-- En-tête de page -->
        <header class="mb-10">
            <h1 class="text-2xl font-bold text-gray-800">Tableau de bord</h1>
            <p class="text-gray-500">Bienvenue dans votre espace de gestion des sites.</p>
        </header>

        <!-- Carte de Bienvenue -->
        <section class="bg-white p-10 rounded-3xl shadow-sm border border-gray-100">
            <div class="max-w-2xl">
                <h2 class="text-3xl font-extrabold text-gray-900 mb-4">
                    Bonjour, <span class="text-red-500 uppercase">Admin</span>
                </h2>
                <p class="text-gray-500 text-lg leading-relaxed">
                    Votre système de gestion est opérationnel. Vous pouvez consulter les statistiques de visites ou ajouter de nouveaux sites touristiques via le menu latéral.
                </p>
                
                <div class="mt-8 flex gap-4">
                    <a href="/page1" class="bg-red-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-red-600 shadow-lg shadow-red-200 transition-all">
                        Gérer les sites
                    </a>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
