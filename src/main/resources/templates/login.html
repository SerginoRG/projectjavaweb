<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Gestion Touristique</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <!-- Container Principal -->
    <div class="flex bg-white shadow-2xl rounded-3xl overflow-hidden max-w-4xl w-full">
        
        <!-- Section Gauche : Formulaire -->
        <div class="w-full md:w-1/2 p-8 lg:p-12">
            <div class="mb-10">
                <h1 class="text-3xl font-bold text-gray-800 uppercase tracking-tight">Bienvenue</h1>
                <p class="text-gray-500 mt-2">Heureux de vous revoir ! Entrez vos accès.</p>
            </div>

            <form th:action="@{/login}" method="post" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Nom d'utilisateur</label>
                    <input type="text" name="username" placeholder="votre@email.com" required
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition-all">
                </div>

                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-semibold text-gray-700">Mot de passe</label>
                        <a href="#" class="text-xs text-gray-400 hover:text-red-500">Oublié ?</a>
                    </div>
                    <!-- Conteneur relatif pour positionner l'icône à l'intérieur -->
                    <div class="relative group">
                        <input type="password" id="loginPassword" name="password" placeholder="••••••••" required
                            class="w-full px-4 py-3 pr-12 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition-all">
                        
                        <!-- Bouton de l'œil -->
                        <button type="button" onclick="toggleLoginPassword()" 
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500 focus:outline-none transition-colors">
                            <svg id="loginEyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <!-- Icône œil barré par défaut -->
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" 
                        class="w-full bg-[#ef4444] text-white py-3 rounded-xl font-bold hover:bg-red-700 shadow-lg shadow-red-200 transition-all transform hover:-translate-y-1">
                    Se connecter
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-gray-600">
                    Pas de compte ? <a href="/signin" class="text-red-500 font-bold hover:underline">S'inscrire</a>
                </p>
            </div>
        </div>

        <!-- Section Droite : Carrousel d'images (SANS ANIMATION) -->
        <div class="hidden md:block w-1/2 bg-gray-100 relative overflow-hidden">
            <img id="carouselImage" src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&q=80&w=1000" 
                 alt="Voyage" class="absolute inset-0 h-full w-full object-cover">
            
            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent flex flex-col justify-end p-12 text-white">
                <h2 id="carouselTitle" class="text-2xl font-bold">Explorez Paris.</h2>
                <p id="carouselDesc" class="mt-2 text-gray-200 text-sm">Gérez vos visites et découvrez des lieux d'exception.</p>
                
                <div class="flex gap-2 mt-6">
                    <div class="dot w-8 h-1.5 rounded-full bg-white opacity-100"></div>
                    <div class="dot w-8 h-1.5 rounded-full bg-white opacity-30"></div>
                    <div class="dot w-8 h-1.5 rounded-full bg-white opacity-30"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const data = [
            {
                url: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&q=80&w=1000",
                title: "Explorez Paris.",
                desc: "Découvrez l'élégance de la ville lumière."
            },
            {
                url: "https://images.unsplash.com/photo-1516483638261-f4dbaf036963?auto=format&fit=crop&q=80&w=1000",
                title: "Évadez-vous en Italie.",
                desc: "Les plus beaux villages de la côte Amalfitaine."
            },
            {
                url: "https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&q=80&w=1000",
                title: "Aventures Sauvages.",
                desc: "Planifiez vos randonnées dans des paysages grandioses."
            }
        ];

        let index = 0;
        const img = document.getElementById('carouselImage');
        const title = document.getElementById('carouselTitle');
        const desc = document.getElementById('carouselDesc');
        const dots = document.querySelectorAll('.dot');

        function nextImage() {
            index = (index + 1) % data.length;
            
            // Changement direct sans transition
            img.src = data[index].url;
            title.innerText = data[index].title;
            desc.innerText = data[index].desc;

            dots.forEach((dot, i) => {
                dot.style.opacity = i === index ? "1" : "0.3";
            });
        }

        setInterval(nextImage, 5000);

        function toggleLoginPassword() {
        const passwordInput = document.getElementById('loginPassword');
        const eyeIcon = document.getElementById('loginEyeIcon');

        // Chemins SVG pour les deux états
        const eyeOpen = `
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        `;
        const eyeClosed = `
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
        `;

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.innerHTML = eyeOpen;
        } else {
            passwordInput.type = 'password';
            eyeIcon.innerHTML = eyeClosed;
        }
    }
    </script>
</body>
</html>
