<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Gestion Touristique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <!-- Container Principal -->
    <div class="flex bg-white shadow-2xl rounded-3xl overflow-hidden max-w-5xl w-full">
        
        <!-- Section Gauche : Carrousel d'images (Changement direct) -->
        <div class="hidden md:block w-1/2 bg-gray-100 relative overflow-hidden">
            <img id="carouselImage" src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&q=80&w=1000" 
                 alt="Aventure Touristique" class="absolute inset-0 h-full w-full object-cover">
            
            <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/80 flex flex-col justify-end p-12 text-white">
                <h2 id="carouselTitle" class="text-3xl font-bold">Commencez l'aventure.</h2>
                <p id="carouselDesc" class="mt-2 text-gray-200">Créez un compte pour planifier vos visites sur les plus beaux sites du monde.</p>
                
                <!-- Indicateurs -->
                <div class="flex gap-2 mt-6">
                    <div class="dot w-8 h-1.5 rounded-full bg-white opacity-100"></div>
                    <div class="dot w-8 h-1.5 rounded-full bg-white opacity-30"></div>
                    <div class="dot w-8 h-1.5 rounded-full bg-white opacity-30"></div>
                </div>
            </div>
        </div>

        <!-- Section Droite : Formulaire d'inscription -->
        <div class="w-full md:w-1/2 p-8 lg:p-12">
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-gray-800">CRÉER UN COMPTE</h1>
                <p class="text-gray-500 mt-2">Rejoignez notre communauté de voyageurs.</p>
            </div>

            <form action="/signup" method="post" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-semibold text-gray-700 mb-1">Nom d'utilisateur</label>
                    <input type="text" id="username" name="username" placeholder="Ex: NomVoyageur" required
                           class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition-all">
                </div>

                <div>
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" name="email" placeholder="voyageur@exemple.com" required
                           class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition-all">
                </div>

                                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <!-- Champ Mot de passe -->
    <div>
        <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Mot de passe</label>
        <div class="relative w-full">
            <input type="password" id="password" name="password" placeholder="••••••••" required
                   class="w-full px-4 py-2.5 pr-12 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition-all">
            
            <!-- inset-y-0 et flex items-center forcent l'icône à rester au milieu à droite de l'input -->
            <div class="absolute inset-y-0 right-0 flex items-center pr-3">
                <button type="button" onclick="togglePassword('password', 'eyeIcon1')" 
                        class="text-gray-400 hover:text-red-500 focus:outline-none transition-colors">
                    <svg id="eyeIcon1" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Champ Confirmation -->
    <div>
        <label for="confirmPassword" class="block text-sm font-semibold text-gray-700 mb-1">Confirmation</label>
        <div class="relative w-full">
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required
                   class="w-full px-4 py-2.5 pr-12 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition-all">
            
            <div class="absolute inset-y-0 right-0 flex items-center pr-3">
                <button type="button" onclick="togglePassword('confirmPassword', 'eyeIcon2')" 
                        class="text-gray-400 hover:text-red-500 focus:outline-none transition-colors">
                    <svg id="eyeIcon2" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

                <div class="pt-4">
                    <button type="submit" 
                            class="w-full bg-[#ef4444] text-white py-3 rounded-xl font-bold hover:bg-red-700 shadow-lg shadow-red-200 transition-all transform hover:-translate-y-1">
                        S'inscrire maintenant
                    </button>
                </div>
            </form>

            <div th:if="${error}" class="bg-red-100 text-red-700 p-3 rounded mb-4">
                <span th:text="${error}"></span>
            </div>

            <div th:if="${success}" class="bg-green-100 text-green-700 p-3 rounded mb-4">
                <span th:text="${success}"></span>
            </div>

            

            <div class="mt-6">
                <button class="w-full flex items-center justify-center gap-2 border border-gray-200 py-2.5 rounded-xl hover:bg-gray-50 transition-all text-sm font-medium">
                    <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5 h-5" alt="Google">
                    S'inscrire avec Google
                </button>
            </div>

            <p class="mt-8 text-center text-sm text-gray-600">
                Déjà membre ? 
                <a href="/" class="text-red-500 font-bold hover:underline">Se connecter</a>
            </p>
        </div>
    </div>

    <script>
        const data = [
            {
                url: "https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&q=80&w=1000",
                title: "Commencez l'aventure.",
                desc: "Créez un compte pour planifier vos visites sur les plus beaux sites."
            },
            {
                url: "https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&q=80&w=1000",
                title: "Destinations Rêvées.",
                desc: "Accédez à une sélection exclusive de sites touristiques mondiaux."
            },
            {
                url: "https://images.unsplash.com/photo-1530789253388-582c481c54b0?auto=format&fit=crop&q=80&w=1000",
                title: "Partagez vos Voyages.",
                desc: "Rejoignez des milliers de passionnés de découvertes."
            }
        ];

        let index = 0;
        const img = document.getElementById('carouselImage');
        const title = document.getElementById('carouselTitle');
        const desc = document.getElementById('carouselDesc');
        const dots = document.querySelectorAll('.dot');

        function nextSlide() {
            index = (index + 1) % data.length;
            
            // Changement immédiat sans animation
            img.src = data[index].url;
            title.innerText = data[index].title;
            desc.innerText = data[index].desc;

            // Mise à jour des indicateurs
            dots.forEach((dot, i) => {
                dot.style.opacity = i === index ? "1" : "0.3";
            });
        }

        setInterval(nextSlide, 5000);
        
 function togglePassword(inputId, iconId) {
    const passwordInput = document.getElementById(inputId);
    const eyeIcon = document.getElementById(iconId);

    // Chemins SVG
    const eyeOpen = `
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
    `;
    const eyeClosed = `
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
    `;

    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.innerHTML = eyeOpen;
    } else {
        passwordInput.type = 'password';
        eyeIcon.innerHTML = eyeClosed;
    }
}

</script>
</body>
</html>
